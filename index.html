<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>360 Memories | Bilingual 360 Photo Booth Experiences</title>
    <meta
      name="description"
      content="360 Memories offers bilingual 360 photo booth experiences for weddings, quinceaneras, birthdays, corporate events, and venues across Dallas."
    />
    <meta property="og:title" content="360 Memories" />
    <meta
      property="og:description"
      content="Fun, professional, bilingual 360 booth experiences that make every guest feel celebrated."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/assets/social-share.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="360 Memories" />
    <meta
      name="twitter:description"
      content="Fun, professional, bilingual 360 booth experiences that make every guest feel celebrated."
    />
    <meta name="twitter:image" content="/assets/social-share.png" />
    <meta name="theme-color" content="#0b0b0d" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="home">
    <div class="page-shell">
      <header class="site-header">
        <a href="#top" class="brand" aria-label="360 Memories home">
          <div class="brand-mark">
            <img src="assets/logo.png" alt="360 Memories Video Booth logo" data-logo />
          </div>
        </a>

        <div class="header-actions">
          <nav class="lang-toggle" aria-label="Language selector">
            <button type="button" class="lang-btn" data-lang-toggle="es">ES</button>
            <button type="button" class="lang-btn" data-lang-toggle="en">EN</button>
          </nav>
          <a class="header-call" data-phone-link href="#">
            <span data-i18n="callNow"></span>
          </a>
        </div>
      </header>

      <main id="top">
        <section class="hero section">
          <div class="hero-copy">
            <p class="eyebrow" data-i18n="heroEyebrow"></p>
            <h1 data-i18n="heroHeadline"></h1>
            <p class="hero-lead" data-i18n="heroSubheadline"></p>

            <div class="hero-highlights">
              <div class="pill" data-i18n="heroPillOne"></div>
              <div class="pill" data-i18n="heroPillTwo"></div>
              <div class="pill" data-i18n="heroPillThree"></div>
            </div>

            <div class="hero-actions">
              <a href="#lead-form" class="btn btn-primary" data-i18n="primaryCta"></a>
              <a href="#" class="btn btn-secondary" data-phone-link>
                <span data-i18n="heroCallCta"></span>
              </a>
            </div>

            <div class="hero-trust">
              <div class="trust-card">
                <strong data-i18n="trustLabelOne"></strong>
                <span data-i18n="trustTextOne"></span>
              </div>
              <div class="trust-card">
                <strong data-i18n="trustLabelTwo"></strong>
                <span data-i18n="trustTextTwo"></span>
              </div>
              <div class="trust-card">
                <strong data-i18n="trustLabelThree"></strong>
                <span data-i18n="trustTextThree"></span>
              </div>
            </div>
          </div>

          <aside class="hero-visual" aria-label="360 booth preview">
            <img
              src="assets/logo-badge-dark.png"
              alt="360 Memories circular logo badge"
              class="hero-badge hero-badge-dark"
            />
            <img
              src="assets/logo-badge-light.png"
              alt="360 Memories alternate logo badge"
              class="hero-badge hero-badge-light"
            />
            <div class="visual-card visual-card-main">
              <span class="visual-label" data-i18n="visualLabelTop"></span>
              <h2 data-i18n="visualHeadline"></h2>
              <p data-i18n="visualBody"></p>
            </div>
            <div class="visual-card visual-card-accent">
              <span class="stat-number">30</span>
              <span class="stat-copy" data-i18n="setupStat"></span>
            </div>
            <div class="visual-grid" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
          </aside>
        </section>

        <section class="section" id="packages">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="packagesEyebrow"></p>
            <h2 data-i18n="packagesTitle"></h2>
            <p data-i18n="packagesIntro"></p>
          </div>

          <div class="packages-grid">
            <article class="package-card">
              <span class="package-time" data-i18n="packageOneLabel"></span>
              <h3 data-package-price="0"></h3>
              <p data-i18n="packageOneBody"></p>
              <a href="#lead-form" class="text-link" data-i18n="packageCta"></a>
            </article>
            <article class="package-card featured">
              <span class="featured-badge" data-i18n="popularBadge"></span>
              <span class="package-time" data-i18n="packageTwoLabel"></span>
              <h3 data-package-price="1"></h3>
              <p data-i18n="packageTwoBody"></p>
              <a href="#lead-form" class="text-link" data-i18n="packageCta"></a>
            </article>
            <article class="package-card">
              <span class="package-time" data-i18n="packageThreeLabel"></span>
              <h3 data-package-price="2"></h3>
              <p data-i18n="packageThreeBody"></p>
              <a href="#lead-form" class="text-link" data-i18n="packageCta"></a>
            </article>
          </div>
        </section>

        <section class="section" id="gallery">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="galleryEyebrow"></p>
            <h2 data-i18n="galleryTitle"></h2>
            <p data-i18n="galleryIntro"></p>
          </div>

          <div class="gallery-layout">
            <article class="gallery-feature">
              <div class="gallery-badge" data-i18n="galleryFeatureBadge"></div>
              <img
                src="assets/logo-badge-light.png"
                alt="360 Memories logo mark"
                class="gallery-logo"
              />
              <h3 data-i18n="galleryFeatureTitle"></h3>
              <p data-i18n="galleryFeatureBody"></p>
            </article>
            <div class="gallery-grid">
              <figure class="gallery-tile">
                <span data-i18n="galleryTileOne"></span>
              </figure>
              <figure class="gallery-tile tall">
                <span data-i18n="galleryTileTwo"></span>
              </figure>
              <figure class="gallery-tile">
                <span data-i18n="galleryTileThree"></span>
              </figure>
              <figure class="gallery-tile wide">
                <span data-i18n="galleryTileFour"></span>
              </figure>
            </div>
          </div>
        </section>

        <section class="section" id="value">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="valueEyebrow"></p>
            <h2 data-i18n="valueTitle"></h2>
            <p data-i18n="valueIntro"></p>
          </div>

          <div class="value-grid">
            <article class="value-card">
              <h3 data-i18n="valueOneTitle"></h3>
              <p data-i18n="valueOneBody"></p>
            </article>
            <article class="value-card">
              <h3 data-i18n="valueTwoTitle"></h3>
              <p data-i18n="valueTwoBody"></p>
            </article>
            <article class="value-card">
              <h3 data-i18n="valueThreeTitle"></h3>
              <p data-i18n="valueThreeBody"></p>
            </article>
            <article class="value-card">
              <h3 data-i18n="valueFourTitle"></h3>
              <p data-i18n="valueFourBody"></p>
            </article>
          </div>
        </section>

        <section class="section" id="faq">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="faqEyebrow"></p>
            <h2 data-i18n="faqTitle"></h2>
            <p data-i18n="faqIntro"></p>
          </div>

          <div class="faq-list">
            <details class="faq-item">
              <summary data-i18n="faqOneQuestion"></summary>
              <p data-i18n="faqOneAnswer"></p>
            </details>
            <details class="faq-item">
              <summary data-i18n="faqTwoQuestion"></summary>
              <p data-i18n="faqTwoAnswer"></p>
            </details>
            <details class="faq-item">
              <summary data-i18n="faqThreeQuestion"></summary>
              <p data-i18n="faqThreeAnswer"></p>
            </details>
            <details class="faq-item">
              <summary data-i18n="faqFourQuestion"></summary>
              <p data-i18n="faqFourAnswer"></p>
            </details>
            <details class="faq-item">
              <summary data-i18n="faqFiveQuestion"></summary>
              <p data-i18n="faqFiveAnswer"></p>
            </details>
          </div>
        </section>

        <section class="section service-area" id="service-area">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="serviceEyebrow"></p>
            <h2 data-i18n="serviceTitle"></h2>
            <p data-i18n="serviceIntro"></p>
          </div>

          <div class="service-area-card">
            <p class="zip-chip">
              <span data-i18n="serviceZipLabel"></span>
              <strong data-config="serviceArea"></strong>
            </p>
            <p data-i18n="serviceBody"></p>
          </div>
        </section>

        <section class="section lead-section" id="lead-form">
          <div class="lead-panel">
            <div class="section-heading">
              <p class="eyebrow" data-i18n="formEyebrow"></p>
              <h2 data-i18n="formTitle"></h2>
              <p data-i18n="formIntro"></p>
            </div>

            <div class="contact-points">
              <a href="#" data-phone-link></a>
              <a href="#" data-email-link data-config="email"></a>
              <a href="#" data-instagram-link></a>
            </div>
          </div>

          <form
            name="lead-capture-360-memories"
            method="POST"
            action="/thank-you.html"
            data-netlify="true"
            netlify-honeypot="bot-field"
            class="lead-form"
          >
            <input type="hidden" name="form-name" value="lead-capture-360-memories" />
            <input type="hidden" name="business" data-config-value="businessName" value="360 Memories" />
            <p class="sr-only">
              <label>
                Do not fill this out if you are human:
                <input name="bot-field" />
              </label>
            </p>

            <label>
              <span data-i18n="fieldName"></span>
              <input type="text" name="name" required autocomplete="name" />
            </label>

            <label>
              <span data-i18n="fieldEventType"></span>
              <input type="text" name="event_type" required />
            </label>

            <label>
              <span data-i18n="fieldEventDate"></span>
              <input type="date" name="event_date" required />
            </label>

            <label>
              <span data-i18n="fieldPhone"></span>
              <input type="tel" name="phone" required autocomplete="tel" />
            </label>

            <label>
              <span data-i18n="fieldEmail"></span>
              <input type="email" name="email" required autocomplete="email" />
            </label>

            <label>
              <span data-i18n="fieldVenue"></span>
              <input type="text" name="venue_city" required />
            </label>

            <label>
              <span data-i18n="fieldGuestCount"></span>
              <input type="number" name="guest_count" min="1" required />
            </label>

            <label>
              <span data-i18n="fieldPackage"></span>
              <select name="package_interest" id="package-interest" required></select>
            </label>

            <label class="full-width">
              <span data-i18n="fieldMessage"></span>
              <textarea name="message" rows="5" required></textarea>
            </label>

            <button type="submit" class="btn btn-primary full-width" data-i18n="formCta"></button>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <p>
          <span data-config="businessName"></span>
          <span data-i18n="footerCopy"></span>
        </p>
      </footer>
    </div>

    <a href="#lead-form" class="mobile-sticky-cta" data-i18n="mobileStickyCta"></a>

    <script src="config.js"></script>
    <script src="main.js"></script>
  </body>
</html>
